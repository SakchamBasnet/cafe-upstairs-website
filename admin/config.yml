backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

publish_mode: simple

collections:
  - name: "site"
    label: "Cafe Upstairs — Website Content"
    files:
      - file: "content/site.json"
        label: "Edit Website Content"
        name: "site"
        fields:
          - { label: "— HOME / HERO SECTION —", name: "hero_divider", widget: "hidden", default: "" }
          - { label: "Hero small text (above title)", name: "heroEyebrow", widget: "string" }
          - { label: "Hero title — line 1", name: "heroTitleLine1", widget: "string" }
          - { label: "Hero title — line 2 (glowing red text)", name: "heroTitleLine2", widget: "string" }
          - { label: "Hero subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Hero background photo", name: "heroImage", widget: "image" }

          - { label: "— ABOUT SECTION —", name: "about_divider", widget: "hidden", default: "" }
          - { label: "About heading — line 1", name: "aboutHeadingLine1", widget: "string" }
          - { label: "About heading — line 2", name: "aboutHeadingLine2", widget: "string" }
          - { label: "About paragraph 1", name: "aboutParagraph1", widget: "text" }
          - { label: "About paragraph 2", name: "aboutParagraph2", widget: "text" }
          - { label: "About paragraph 3", name: "aboutParagraph3", widget: "text" }
          - { label: "About section photo", name: "aboutImage", widget: "image" }

          - { label: "— MENU SECTION —", name: "menu_divider", widget: "hidden", default: "" }
          - { label: "Menu category 1 — title", name: "menuCat1Title", widget: "string" }
          - { label: "Menu category 1 — description", name: "menuCat1Desc", widget: "text" }
          - { label: "Menu category 2 — title", name: "menuCat2Title", widget: "string" }
          - { label: "Menu category 2 — description", name: "menuCat2Desc", widget: "text" }
          - { label: "Menu category 3 — title", name: "menuCat3Title", widget: "string" }
          - { label: "Menu category 3 — description", name: "menuCat3Desc", widget: "text" }

          - { label: "— GALLERY SECTION (7 photos) —", name: "gallery_divider", widget: "hidden", default: "" }
          - { label: "Gallery photo 1", name: "galleryImage1", widget: "image" }
          - { label: "Gallery photo 1 — caption", name: "galleryCaption1", widget: "string" }
          - { label: "Gallery photo 2", name: "galleryImage2", widget: "image" }
          - { label: "Gallery photo 2 — caption", name: "galleryCaption2", widget: "string" }
          - { label: "Gallery photo 3", name: "galleryImage3", widget: "image" }
          - { label: "Gallery photo 3 — caption", name: "galleryCaption3", widget: "string" }
          - { label: "Gallery photo 4", name: "galleryImage4", widget: "image" }
          - { label: "Gallery photo 4 — caption", name: "galleryCaption4", widget: "string" }
          - { label: "Gallery photo 5", name: "galleryImage5", widget: "image" }
          - { label: "Gallery photo 5 — caption", name: "galleryCaption5", widget: "string" }
          - { label: "Gallery photo 6", name: "galleryImage6", widget: "image" }
          - { label: "Gallery photo 6 — caption", name: "galleryCaption6", widget: "string" }
          - { label: "Gallery photo 7", name: "galleryImage7", widget: "image" }
          - { label: "Gallery photo 7 — caption", name: "galleryCaption7", widget: "string" }

          - { label: "— NEON SIGN SECTION —", name: "sign_divider", widget: "hidden", default: "" }
          - { label: "Sign heading — line 1", name: "signHeadingLine1", widget: "string" }
          - { label: "Sign heading — line 2", name: "signHeadingLine2", widget: "string" }
          - { label: "Sign paragraph", name: "signParagraph", widget: "text" }

          - { label: "— VISIT / LOCATION SECTION —", name: "visit_divider", widget: "hidden", default: "" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Hours text", name: "hours", widget: "string" }
          - { label: "Since text", name: "since", widget: "string" }
          - { label: "Footer tagline", name: "footerTagline", widget: "text" }

          - { label: "— SOCIAL MEDIA LINKS —", name: "social_divider", widget: "hidden", default: "" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
          - { label: "TikTok URL", name: "tiktokUrl", widget: "string" }
          - { label: "Facebook URL", name: "facebookUrl", widget: "string" }
          - { label: "Google Maps URL", name: "mapsUrl", widget: "string" }

          - { label: "— DAILY NOTICE BOARD —", name: "notice_divider", widget: "hidden", default: "" }
          - { label: "Show notice banner on the site?", name: "noticeActive", widget: "boolean", default: true }
          - { label: "Today's notice / update", name: "noticeText", widget: "text", hint: "e.g. 'Closed for Dashain, back on the 15th' or 'Fresh brownies today!'" }

          - { label: "— CUSTOMER REVIEWS —", name: "reviews_divider", widget: "hidden", default: "" }
          - { label: "Reviews section heading", name: "reviewsHeading", widget: "string" }
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            summary: "{{name}} — {{rating}}★"
            fields:
              - { label: "Customer name", name: "name", widget: "string" }
              - { label: "Rating (1–5)", name: "rating", widget: "number", min: 1, max: 5, value_type: "int" }
              - { label: "Review text", name: "text", widget: "text" }

          - { label: "— CUSTOMER PHOTOS —", name: "custphotos_divider", widget: "hidden", default: "" }
          - { label: "Customer photos section heading", name: "customerPhotosHeading", widget: "string" }
          - { label: "Customer photos section subtext", name: "customerPhotosSubtext", widget: "text" }
          - label: "Customer photos"
            name: "customerPhotos"
            widget: "list"
            summary: "{{caption}}"
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Caption / customer name", name: "caption", widget: "string" }

          - { label: "— ORDER VIA WHATSAPP —", name: "order_divider", widget: "hidden", default: "" }
          - { label: "Counter WhatsApp number (digits only, with country code, no + or spaces — e.g. 9779767263395)", name: "whatsappNumber", widget: "string" }
          - { label: "Order section heading", name: "orderHeading", widget: "string" }
          - { label: "Order section subtext", name: "orderSubtext", widget: "text" }
          - label: "Menu items"
            name: "menuItems"
            widget: "list"
            summary: "{{category}} — {{name}} (Rs. {{price}})"
            fields:
              - { label: "Category (group items with the same category together, e.g. Coffee, Cold Drinks & Juice, Food)", name: "category", widget: "string" }
              - { label: "Item name", name: "name", widget: "string" }
              - { label: "Price (Rs.)", name: "price", widget: "number", value_type: "int" }
